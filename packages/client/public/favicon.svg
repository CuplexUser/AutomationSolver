<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0f141b" stroke="#2b3a4b" />
  <!-- power rails: left rail live (amber), right rail cold (steel) -->
  <rect x="4" y="6" width="2.5" height="20" rx="1.2" fill="#ffb020" />
  <rect x="25.5" y="6" width="2.5" height="20" rx="1.2" fill="#3a4d61" />
  <!-- rung wire: energized up to the open contact, cold after it -->
  <path d="M6.5 16 H12.5" stroke="#ffb020" stroke-width="2" stroke-linecap="round" />
  <path d="M19.5 16 H25.5" stroke="#3a4d61" stroke-width="2" stroke-linecap="round" />
  <!-- normally-open contact -->
  <path d="M12.5 10 V22" stroke="#ffb020" stroke-width="2.4" stroke-linecap="round" />
  <path d="M19.5 10 V22" stroke="#4a5f74" stroke-width="2.4" stroke-linecap="round" />
</svg>
